services:
  rynctl-monitor:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: rynctl-monitor
    ports:
      - "${RYNCTL_PORT:-8080}:8080"
    volumes:
      - rynctl-data:/data
      # Mount host directories you want to sync (uncomment and edit):
      # - /home/data:/home/data:ro
      # - /var/www:/var/www:ro
      # - /backups:/backups
      # Mount SSH keys for remote rsync (uncomment and edit):
      # - ~/.ssh/id_rsa:/root/.ssh/id_rsa:ro
      # - ~/.ssh/known_hosts:/root/.ssh/known_hosts:ro
    environment:
      - RYNCTL_PORT=8080
      - RYNCTL_SECRET=${RYNCTL_SECRET:-change-me-to-a-random-secret}
    restart: unless-stopped

  backend-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: backend-tests
    environment:
      - RYNCTL_SECRET=test-secret
    profiles: ["tools"]

  frontend-build:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: frontend-build
    working_dir: /workspace/frontend
    volumes:
      - ./frontend:/workspace/frontend
      - frontend-node-modules:/workspace/frontend/node_modules
      - ./static:/workspace/static
    command: ["npm", "run", "build"]
    profiles: ["tools"]

  e2e-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: e2e-tests
    depends_on:
      rynctl-monitor:
        condition: service_healthy
    environment:
      - BASE_URL=http://rynctl-monitor:8080
    profiles: ["tools"]

volumes:
  rynctl-data:
  frontend-node-modules:
